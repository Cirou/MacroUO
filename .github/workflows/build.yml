name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build MacroUO
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Solution/MacroUO.sln

      - name: Build (Release)
        run: msbuild Solution/MacroUO.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroUO-Release
          path: Solution/Output/Release/
